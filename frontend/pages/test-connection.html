<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الاتصال - MedAssist AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .status {
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .status.loading {
            background: #fff3cd;
            color: #856404;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        .info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 14px;
            line-height: 1.6;
        }
        .info strong {
            color: #667eea;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 20px;
        }
        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .hidden {
            display: none;
        }
        .success-button {
            background: #28a745;
            margin-top: 10px;
        }
        .details {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 اختبار الاتصال</h1>
        <p class="subtitle">MedAssist AI - Gemini API Connection Test</p>
        
        <div id="status" class="status loading">
            ⏳ جاري فحص الاتصال...
        </div>
        
        <div class="info">
            <strong>ما يتم فحصه:</strong><br>
            ✅ هل الخادم يعمل على المنفذ 8000؟<br>
            ✅ هل مفتاح Gemini API مُعيّن؟<br>
            ✅ هل يمكن الاتصال بـ API؟
        </div>
        
        <div id="details" class="details hidden"></div>
        
        <button onclick="testConnection()">🔄 إعادة الاختبار</button>
        <button class="success-button" onclick="window.location.href='dashboard.html'">
            ✅ فتح Dashboard
        </button>
    </div>

    <script>
        async function testConnection() {
            const statusDiv = document.getElementById('status');
            const detailsDiv = document.getElementById('details');
            
            statusDiv.className = 'status loading';
            statusDiv.innerHTML = '⏳ جاري فحص الاتصال...';
            detailsDiv.style.display = 'none';
            
            try {
                // Test 1: Health Check
                const response = await fetch('http://localhost:8000/health');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                // Success!
                statusDiv.className = 'status success';
                statusDiv.innerHTML = '✅ الاتصال ناجح! النظام يعمل بشكل صحيح';
                
                detailsDiv.style.display = 'block';
                detailsDiv.innerHTML = `📊 تفاصيل الاتصال:

الحالة: ${data.status}
Gemini API: ${data.gemini_configured ? '✅ مُعيّن' : '❌ غير مُعيّن'}
الرسالة: ${data.message}

🎉 كل شيء يعمل بشكل ممتاز!
يمكنك الآن استخدام النظام.`;
                
            } catch (error) {
                // Error
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '❌ فشل الاتصال!';
                
                detailsDiv.style.display = 'block';
                detailsDiv.innerHTML = `⚠️ الخطأ:
${error.message}

🔧 الحلول المقترحة:

1. تأكد من تشغيل الخادم:
   python api/main.py

2. تحقق من أن المنفذ 8000 متاح

3. تأكد من تعيين GEMINI_API_KEY

4. افتح Console المتصفح (F12) للمزيد من التفاصيل`;
            }
        }
        
        // Test automatically on page load
        window.addEventListener('DOMContentLoaded', testConnection);
    </script>
</body>
</html>
