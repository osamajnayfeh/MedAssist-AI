<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClinicalMind | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>
  <main class="container page-shell auth-shell">
    <section class="panel auth-card">
      <h1>Login</h1>
      <form id="login-form" class="stack">
        <label for="login-email">Email</label>
        <input id="login-email" type="email" required>
        <label for="login-password">Password</label>
        <input id="login-password" type="password" required>
        <button class="btn" type="submit">Sign In</button>
      </form>
      <p>No account? <a href="register.html">Create one</a></p>
    </section>
  </main>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
