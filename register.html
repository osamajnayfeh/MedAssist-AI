<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClinicalMind | Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>
  <main class="container page-shell auth-shell">
    <section class="panel auth-card">
      <h1>Create Account</h1>
      <form id="register-form" class="stack">
        <label for="register-name">Full name</label>
        <input id="register-name" type="text" required>
        <label for="register-email">Email</label>
        <input id="register-email" type="email" required>
        <label for="register-password">Password</label>
        <input id="register-password" type="password" required>
        <button class="btn" type="submit">Register</button>
      </form>
      <p>Already registered? <a href="login.html">Sign in</a></p>
    </section>
  </main>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
